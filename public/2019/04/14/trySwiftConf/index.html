<meta property="og:description" content="何周遅れかわかりませんが自分の記録も兼ねて残して置こうと思います。
今回、私はtry!Swift Tokyoに学生枠を利用して参加させてもらいました。$350の参加費が$50になるので、学生の自分にとってはかなり助かりました！
公式Flickerも公開されたのでそれを見つつ、自分の記憶に残った発表をメモしていきたいと思います。
全ての発表が発表が素晴らしかったんですが、その中でも自分の興味のある分野のものなど５つを選んで軽くまとめてみました。
native macOS application、またはAppKitの世界 こちらの発表はmacOSアプリケーションについてでした。自分はSwiftを割と長い期間使ってますが、全くといっていいほどmacOSアプリケーションについては知識がなかったので以前から楽しみにしていました。最終的にアプリケーションデザインに関する自分が知らなかった事を色々しれてすごくよかったです。macOSが題材でしたが、iOSにも通じるものも多くありすごく勉強になりました。あとはスライドのデザインがとても綺麗でした。
ARKitのアプリを作ろう こちらはARKitについてのとても実践的な発表でした。発表をされていたNamrataさんはARKitについての本も執筆されたそうです。自分は常にARKitで何かしたいと思っていたのでとても参考になりました。
Swiftでソーシャルネットワークをつくろう こちらの発表はServer Side Swiftに関する発表でした。前半はSSSの現状に関する発表でした。様々な開発の状況や、SSSを利用してるプロダクトや企業の紹介などでした。後半はSSSを利用してSNSを作るというデモの発表でした。こちらは発表者の方が執筆されたServer Side Swiftについての本の中のデモでもあるそうです。
賢者のString こちらはSwiftのStringに関する発表でした。Appleに勤めている方が発表されていた事もあっても注目度が高かったように思います。発表はString型の仕組みに関するもので正直ちゃんと理解できているわけではないのですが、プログラミング言語としてのSwiftをもっと深く学びたいと思わせてくれる発表だったと思います。また個人的にスピーカーの方と直接はなすことができたのが、なかなかできる事ではないと思うので、とてもよかったと思います。
文字起こし 次へつなごう— Extending a hand to the next generation of Apple developers コーディングを学ぶには絶好のタイミング！技術は日進月歩、進化を遂げています。Apple Platformでの開発はSwiftやSwift playgroundにおける進歩によって、より簡単に取り組めるようになりました。しかし、この業界では、ソフトウェアエンジニアになろうとしている人と、エンジニアリングの役割を果たそうとしているテック企業の採用要求にはまだギャップが存在します。このトークでは、ソフトウェアエンジニアの人口統計からよく見落とされがちなポイントに焦点を当てます。これからソフトウェアエンジニアになろうとしている人々にどのように手を差し伸べられるのかを議論し、私たちソフトウェアエンジニアがApple開発者コミュニティをどのように成長させられるのかについてお話しします。ソフトウェアエンジニアではない人が壁を乗り越えることの難しさや、SwiftとこのApple開発者コミュニティが提供できるものとは何なのかについてもお話します。引用元
こちらの発表はテック業界における様々なギャップについてでした。プログラミングを学ぶものとして、この発表を聞いていて、いろいろ思う事がありました。とりあえずこの業界がよりダイバーシティのあるものになると良いなと思います。
文字起こし 感想 初めてのカンファレンス参加でしたがとてもいい経験になりました。機会があればまた参加したいです。東京以外でもやっているので、いつかは挑戦してみたいです。
